services:
  - type: web
    name: ecocoin-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node backend_secured.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: ADMIN_ADDRESSES
        value: "0x2F1a7d23C0bE593B39352F9fD3BAED37DC9Ff686"
      - key: FRONTEND_URL
        value: "https://ecocoin2.netlify.app"
